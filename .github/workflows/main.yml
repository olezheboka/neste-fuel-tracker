name: Main

# Full gate on every push to main. The deploy job depends on ALL test/build/e2e
# jobs, so any failure (unit, parsing, e2e, security) blocks the production deploy.
on:
  push:
    branches: [main]

concurrency:
  group: main
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: client/package-lock.json }
      - run: npm ci
        working-directory: client
      - run: npm run lint
        working-directory: client

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: server/package-lock.json }
      - run: npm ci
        working-directory: server
      - run: npm test
        working-directory: server
        env: { CI: 'true' }

  test-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: client/package-lock.json }
      - run: npm ci
        working-directory: client
      - run: npm test
        working-directory: client
        env: { CI: 'true' }

  e2e:
    name: E2E (desktop + mobile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npx playwright test
        env: { CI: 'true' }
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  deploy:
    name: Deploy production
    needs: [lint, test-server, test-client, e2e]
    runs-on: ubuntu-latest
    # Gate production behind a GitHub Environment with a required reviewer
    # (configure "production" under Settings → Environments). Vercel's own
    # git integration can be disabled for main so this is the single deploy path.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      - name: Smoke test production
        # Hit the canonical production host (the apex 308-redirects to www); -L
        # follows the redirect and --retry rides out alias propagation.
        run: |
          set -e
          curl -fsSL --retry 5 --retry-delay 5 https://www.cenometrs.lv/api/health | grep -q '"status":"ok"'
          curl -fsSL --retry 5 --retry-delay 5 https://www.cenometrs.lv/api/prices/latest | grep -q '"price"'
