name: Nightly

# Scheduled health checks. These hit live provider sites and so must NEVER gate
# merges/deploys — they run on their own schedule and open an issue on failure.
on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC daily
  workflow_dispatch: {}

# Read-only by default; the parser-health job widens to issues:write below.
permissions:
  contents: read

jobs:
  parser-health:
    name: Live parser health check
    runs-on: ubuntu-latest
    # Needs issues:write so the github-script step can open a tracking issue
    # when a provider's HTML changes and the live parse fails.
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 20, cache: npm, cache-dependency-path: server/package-lock.json }
      - run: npm ci
        working-directory: server
      - name: Check all providers parse against live HTML
        id: health
        run: npm run health:parsers
        working-directory: server
      - name: Open an issue if a provider broke
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const title = 'Nightly parser health check failed';
            const body = `A provider site likely changed — the live parser health check failed.\n\n` +
              `See the run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              `Fix the affected scraper and refresh fixtures with \`npm --prefix server run fixtures:refresh\`.`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', labels: 'parser-health',
            });
            if (!existing.data.length) {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body, labels: ['parser-health'],
              });
            }

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with: { node-version: 20 }
      - name: Audit server (high+)
        working-directory: server
        run: npm audit --omit=dev --audit-level=high
      - name: Audit client (high+)
        working-directory: client
        run: npm audit --omit=dev --audit-level=high
