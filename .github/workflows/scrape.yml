name: Manual fuel-price scrape

# Manual trigger for the CRON_SECRET-gated /api/scrape endpoint. Hourly
# scheduling is handled externally by cron-job.org (GitHub's scheduler proved
# too unreliable — newly-added/changed schedules routinely failed to fire).
# This workflow is kept only as a manual "Run workflow" fallback for testing.
#
# Setup: a repository secret named CRON_SECRET, matching the CRON_SECRET
# environment variable in the Vercel project.

on:
  workflow_dispatch: {}    # manual "Run workflow" button only

# Never overlap runs.
concurrency:
  group: fuel-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/scrape
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # Change this if you move to a custom domain; the vercel.app host always works.
          SCRAPE_URL: https://neste-fuel-tracker.vercel.app/api/scrape
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repository secret is not set."
            exit 1
          fi
          code=$(curl -sS -m 120 -o /tmp/resp.json -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SCRAPE_URL")
          echo "HTTP $code"
          echo "Response: $(cat /tmp/resp.json 2>/dev/null)"
          if [ "$code" != "200" ]; then
            echo "::error::Scrape failed (HTTP $code)"
            exit 1
          fi
